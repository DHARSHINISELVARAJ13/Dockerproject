global:
  resolve_timeout: 5m

route:
  receiver: operations-channel
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - urgency="critical"
      receiver: critical-channel
      continue: false

    - matchers:
        - urgency="operational"
      receiver: operations-channel
      continue: false

receivers:
  - name: critical-channel
    slack_configs:
      - api_url: ${ALERTMANAGER_CRITICAL_SLACK_WEBHOOK}
        channel: "#quickblog-critical"
        send_resolved: true
        title: "[CRITICAL] {{ .CommonLabels.alertname }}"
        text: "{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}"

  - name: operations-channel
    slack_configs:
      - api_url: ${ALERTMANAGER_OPS_SLACK_WEBHOOK}
        channel: "#quickblog-ops"
        send_resolved: true
        title: "[OPS] {{ .CommonLabels.alertname }}"
        text: "{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}"
